[Rainmeter]
Update=1000
AccurateText=1
DynamicWindowSize=1
OnRefreshAction=[!ZPos 1]
ContextTitle=Open Project Hermes
ContextAction=["C:\\Users\\scott\\Projects\\Project-Hermes"]

[Metadata]
Name=Hermes Performance
Author=Scott Renny / Project Hermes
Information=Project Hermes desktop performance panel using native Rainmeter measures.
Version=0.1.1
License=MIT

[Variables]
PanelWidth=344
PanelHeight=520
Margin=20
Accent=0,229,255
AccentMuted=0,126,145
Background=7,11,16
PanelAlpha=235
Text=244,247,250
TextMuted=154,167,178
Divider=37,49,58
Success=57,229,140
Warning=255,181,71
FontUI=Segoe UI
FontMono=Cascadia Mono

; -----------------------------------------------------------------------------
; Measures
; -----------------------------------------------------------------------------

[MeasureCPU]
Measure=CPU
Processor=0

[MeasureRAM]
Measure=PhysicalMemory

[MeasureDisk]
Measure=FreeDiskSpace
Drive=C:
InvertMeasure=1

[MeasureDiskFree]
Measure=FreeDiskSpace
Drive=C:

[MeasureNetIn]
Measure=NetIn
Interface=Best

[MeasureNetOut]
Measure=NetOut
Interface=Best

[MeasureUptime]
Measure=Uptime
Format="%4!i!d %3!i!h %2!i!m"

[MeasureBattery]
Measure=Plugin
Plugin=PowerPlugin
PowerState=Percent

[MeasureBatteryState]
Measure=Plugin
Plugin=PowerPlugin
PowerState=ACLine

[MeasureTime]
Measure=Time
Format=%H:%M:%S

[MeasureDate]
Measure=Time
Format=%A, %B %#d

; -----------------------------------------------------------------------------
; Shared styles
; -----------------------------------------------------------------------------

[StyleLabel]
FontFace=#FontUI#
FontSize=11
FontColor=#Text#
AntiAlias=1
StringCase=Upper

[StyleValue]
FontFace=#FontMono#
FontSize=11
FontColor=#Text#
AntiAlias=1
StringAlign=Right

[StyleSubtext]
FontFace=#FontUI#
FontSize=9
FontColor=#TextMuted#
AntiAlias=1

[StyleBarBackground]
Meter=Shape
Shape=Rectangle 0,0,190,4,2 | Fill Color #Divider# | StrokeWidth 0

[StyleBar]
Meter=Bar
W=190
H=4
BarColor=#Accent#
SolidColor=0,0,0,1

; -----------------------------------------------------------------------------
; Panel
; -----------------------------------------------------------------------------

[MeterPanel]
Meter=Shape
X=0
Y=0
Shape=Rectangle 1,1,#PanelWidth#,#PanelHeight#,16 | Fill Color #Background#,#PanelAlpha# | Stroke Color #AccentMuted#,210 | StrokeWidth 1

[MeterHeaderIcon]
Meter=String
X=20
Y=18
Text=H
FontFace=#FontUI#
FontSize=18
FontColor=#Accent#
AntiAlias=1

[MeterHeader]
Meter=String
X=52
Y=23
Text=PERFORMANCE
FontFace=#FontUI#
FontSize=12
FontWeight=600
FontColor=#Accent#
AntiAlias=1
StringCase=Upper

[MeterTime]
Meter=String
MeasureName=MeasureTime
X=324
Y=19
FontFace=#FontMono#
FontSize=10
FontColor=#TextMuted#
AntiAlias=1
StringAlign=Right

[MeterDivider1]
Meter=Shape
X=20
Y=58
Shape=Line 0,0,304,0 | Stroke Color #Divider# | StrokeWidth 1

