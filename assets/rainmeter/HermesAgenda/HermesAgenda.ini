[Rainmeter]
Update=1000
AccurateText=1
DynamicWindowSize=1
OnRefreshAction=[!ZPos 1]
ContextTitle=Edit Hermes priorities
ContextAction=["notepad.exe" "#CURRENTPATH#HermesAgenda.ini"]

[Metadata]
Name=Hermes Agenda
Author=Scott Renny / Project Hermes
Information=Compact date and priority panel for the Project Hermes operations sidebar.
Version=0.1.0
License=MIT

[Variables]
Priority1=Review Project Hermes progress
Priority2=Check systems and updates
Priority3=Plan the next engineering task
Priority4=Review alerts and outstanding work
Priority5=Capture notes and lessons learned
PanelWidth=344
PanelHeight=260
Accent=0,229,255
AccentMuted=0,126,145
Background=7,11,16
PanelAlpha=235
Text=244,247,250
TextMuted=154,167,178
Divider=37,49,58
Success=57,229,140
FontUI=Segoe UI
FontMono=Cascadia Mono

[MeasureDay]
Measure=Time
Format=%A

[MeasureDate]
Measure=Time
Format=%B %#d

[MeasureMonthYear]
Measure=Time
Format=%B %Y

[MeasureWeek]
Measure=Time
Format=%V

[MeterPanel]
Meter=Shape
X=0
Y=0
Shape=Rectangle 1,1,#PanelWidth#,#PanelHeight#,16 | Fill Color #Background#,#PanelAlpha# | Stroke Color #AccentMuted#,210 | StrokeWidth 1

[MeterHeaderIcon]
Meter=String
X=20
Y=15
Text=+
FontFace=#FontMono#
FontSize=16
FontColor=#Accent#
AntiAlias=1

[MeterHeader]
Meter=String
X=48
Y=19
Text=AGENDA
FontFace=#FontUI#
FontSize=11
FontWeight=600
FontColor=#Accent#
AntiAlias=1
StringCase=Upper

[MeterWeek]
Meter=String
MeasureName=MeasureWeek
X=324
Y=19
Text=WEEK %1
FontFace=#FontMono#
FontSize=9
FontColor=#TextMuted#
AntiAlias=1
StringAlign=Right

[MeterDivider1]
Meter=Shape
X=20
Y=44
Shape=Line 0,0,304,0 | Stroke Color #Divider# | StrokeWidth 1

[MeterDay]
Meter=String
MeasureName=MeasureDay
X=20
Y=57
FontFace=#FontUI#
FontSize=10
FontWeight=600
FontColor=#Text#
AntiAlias=1
StringCase=Upper

[MeterDate]
Meter=String
MeasureName=MeasureDate
X=20
Y=75
FontFace=#FontUI#
FontSize=18
FontWeight=600
FontColor=#Accent#
AntiAlias=1
StringCase=Upper

[MeterMonthYear]
Meter=String
MeasureName=MeasureMonthYear
X=324
Y=82
FontFace=#FontMono#
FontSize=9
FontColor=#TextMuted#
AntiAlias=1
StringAlign=Right
StringCase=Upper

[MeterDivider2]
Meter=Shape
X=20
Y=112
Shape=Line 0,0,304,0 | Stroke Color #Divider# | StrokeWidth 1

[MeterPriorityHeader]
Meter=String
X=20
Y=124
Text=PRIORITIES
FontFace=#FontUI#
FontSize=8
FontWeight=600
FontColor=#TextMuted#
AntiAlias=1
StringCase=Upper

[StylePriority]
Meter=String
X=20
W=300
H=18
ClipString=1
FontFace=#FontUI#
FontSize=9
FontColor=#Text#
AntiAlias=1

[MeterPriority1]
Meter=String
MeterStyle=StylePriority
Y=145
Text="01  #Priority1#"

[MeterPriority2]
Meter=String
MeterStyle=StylePriority
Y=166
Text="02  #Priority2#"

[MeterPriority3]
Meter=String
MeterStyle=StylePriority
Y=187
Text="03  #Priority3#"

[MeterPriority4]
Meter=String
MeterStyle=StylePriority
Y=208
Text="04  #Priority4#"

[MeterPriority5]
Meter=String
MeterStyle=StylePriority
Y=229
Text="05  #Priority5#"

[MeterEditHint]
Meter=String
X=324
Y=124
Text=RIGHT-CLICK TO EDIT
FontFace=#FontMono#
FontSize=7
FontColor=#AccentMuted#
AntiAlias=1
StringAlign=Right
