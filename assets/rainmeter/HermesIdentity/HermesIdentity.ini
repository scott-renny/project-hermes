[Rainmeter]
Update=1000
AccurateText=1
DynamicWindowSize=1
OnRefreshAction=[!ZPos 1]
ContextTitle=Open Project Hermes
ContextAction=["C:\\Users\\scott\\Projects\\Project-Hermes"]

[Metadata]
Name=Hermes Identity
Author=Scott Renny / Project Hermes
Information=Project Hermes Mobile Operations Terminal identity plaque.
Version=0.1.0
License=MIT

[Variables]
PanelWidth=344
PanelHeight=96
Accent=0,229,255
AccentMuted=0,126,145
Background=7,11,16
PanelAlpha=225
Text=244,247,250
TextMuted=154,167,178
Success=57,229,140
FontUI=Segoe UI
FontMono=Cascadia Mono

[MeterPanel]
Meter=Shape
X=0
Y=0
Shape=Rectangle 1,1,#PanelWidth#,#PanelHeight#,16 | Fill Color #Background#,#PanelAlpha# | Stroke Color #AccentMuted#,195 | StrokeWidth 1

[MeterMark]
Meter=String
X=20
Y=20
Text=H
FontFace=#FontUI#
FontSize=24
FontWeight=600
FontColor=#Accent#
AntiAlias=1

[MeterProject]
Meter=String
X=65
Y=18
Text=PROJECT HERMES
FontFace=#FontUI#
FontSize=12
FontWeight=600
FontColor=#Text#
AntiAlias=1
StringCase=Upper

[MeterSubtitle]
Meter=String
X=65
Y=40
Text=MOBILE OPERATIONS TERMINAL
FontFace=#FontUI#
FontSize=8
FontColor=#TextMuted#
AntiAlias=1
StringCase=Upper

[MeterStatusDot]
Meter=Shape
X=66
Y=68
Shape=Ellipse 0,0,3,3 | Fill Color #Success# | StrokeWidth 0

[MeterStatus]
Meter=String
X=78
Y=62
Text=CONNECTED  /  SECURE  /  OPERATIONAL
FontFace=#FontMono#
FontSize=8
FontColor=#Success#
AntiAlias=1
StringCase=Upper
